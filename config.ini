# Configuration File for Resume Screening System

## Data Loading Configuration
### Kaggle Dataset
KAGGLE_DATASET_NAME="snehaanbhawal/resume-dataset"
AUTO_DOWNLOAD=true

## NLP Preprocessing Configuration
### Tokenization & Lemmatization
USE_LEMMATIZATION=true
REMOVE_STOPWORDS=true
LOWERCASE_TEXT=true

### Text Cleaning
REMOVE_SPECIAL_CHARS=true
REMOVE_URLs=true
REMOVE_EMAILS=true

## Feature Extraction Configuration
### TF-IDF Parameters
TF_IDF_MAX_FEATURES=5000
TF_IDF_MAX_DF=0.95
TF_IDF_MIN_DF=2
TF_IDF_NGRAM_RANGE="(1,2)"

## Matching Configuration
### Similarity Scoring
SIMILARITY_METRIC="cosine"
SIMILARITY_THRESHOLD=0.30
TOP_CANDIDATES=10

### Match Quality Classification
EXCELLENT_MATCH_THRESHOLD=0.80
GOOD_MATCH_THRESHOLD=0.60
MODERATE_MATCH_THRESHOLD=0.40
WEAK_MATCH_THRESHOLD=0.20

## Shortlisting Configuration
DEFAULT_SHORTLIST_COUNT=5
APPLY_DIVERSITY_FILTER=false

## Export Configuration
### Output Formats
EXPORT_CSV=true
EXPORT_EXCEL=true
EXPORT_JSON=true

### File Locations
OUTPUT_DIRECTORY="outputs"
INCLUDE_CHARTS=true

## Model Configuration
### Classification Models (if supervised)
TRAIN_LOGISTIC_REGRESSION=true
TRAIN_NAIVE_BAYES=true
TRAIN_SVM=true
TRAIN_RANDOM_FOREST=true

### Clustering (if unsupervised)
N_CLUSTERS=5

## Performance Configuration
### Processing
MAX_RESUMES=10000
BATCH_SIZE=100
USE_MULTIPROCESSING=true
N_JOBS=-1

### Memory
MAX_MEMORY_MB=2048
CACHE_FEATURES=true

## Logging Configuration
LOG_LEVEL="INFO"
LOG_FILE="logs/resume_screening.log"
SAVE_LOGS=true

## Web Interface Configuration (Streamlit)
STREAMLIT_PORT=8501
STREAMLIT_THEME="light"
MAX_UPLOAD_SIZE_MB=100
ENABLE_ANALYTICS=true

## Database Configuration
USE_DATABASE=false
DATABASE_TYPE="sqlite"
DATABASE_PATH="data/resume_screening.db"

## Advanced Options
### Bias Reduction
ENABLE_BIAS_DETECTION=true
ANONYMIZE_CANDIDATES=false

### Caching
ENABLE_RESULT_CACHING=true
CACHE_DURATION_HOURS=24

### Notifications
ENABLE_NOTIFICATIONS=false
NOTIFICATION_EMAIL=""

## Security
### Data Privacy
ENCRYPT_SENSITIVE_DATA=false
DELETE_UPLOADS_AFTER_PROCESSING=true
RETENTION_DAYS=30

### Access Control
REQUIRE_AUTHENTICATION=false
ADMIN_EMAIL=""

## Integration
### Third-Party Services
INTEGRATE_WITH_ATS=false
ATS_API_KEY=""

### Email Notifications
ENABLE_EMAIL=false
SMTP_SERVER=""
SMTP_PORT=587

## System Configuration
### General
SYSTEM_NAME="Resume Screening System"
VERSION="1.0.0"
AUTO_UPDATE=false

### Development
DEBUG_MODE=false
ENABLE_API_DOCS=true
ENABLE_TESTING_UI=true

## Dataset Configuration
### Resume Data
RESUME_TEXT_COLUMN="Resume"
RESUME_ID_COLUMN="ID"
RESUME_NAME_COLUMN="Name"

### Labels (if available)
LABEL_COLUMN="Category"
NUM_CLASSES=6

## Feature Engineering
### Custom Features
EXTRACT_SKILLS=true
EXTRACT_EXPERIENCE_LEVEL=true
EXTRACT_EDUCATION=true
EXTRACT_CERTIFICATION=true

### Business Rules
MINIMUM_EXPERIENCE_YEARS=0
PREFERRED_EDUCATION_LEVEL="Bachelor's"
